<h2>Catálogo de Produtos</h2>



<div class="grid">
  <div class="card" *ngFor="let produto of produtosFiltrados">
    <h3>{{ produto.nome }}</h3>
    <p>{{ produto.descricao }}</p>
    <strong>R$ {{ produto.preco }}</strong>
    <button (click)="adicionar(produto)">Adicionar ao carrinho</button>
  </div>
</div>
