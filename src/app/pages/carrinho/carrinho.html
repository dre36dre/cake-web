<h2>Meu Carrinho</h2>

<ul>
  <li *ngFor="let item of itens">
    {{ item.produto.nome }} - R$ {{ item.produto.preco }}

    <input type="number"
           [value]="item.quantidade"
           (change)="alterarQtd(item.produto.id, $event.target.valueAsNumber)" />

    <button (click)="remover(item.produto.id)">Remover</button>
  </li>
</ul>

<strong>Total: R$ {{ calcularTotal() }}</strong>
