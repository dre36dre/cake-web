<div class="admin-page">
  <h1>{{ titulo }}</h1>

  <section class="admin-form">
    <h2>Gerenciar Produtos</h2>

    <form (ngSubmit)="salvarProduto()">
      <label>
        Nome
        <input type="text" [(ngModel)]="nome" name="nome" required />
      </label>

      <label>
        Preço
        <input type="number" [(ngModel)]="preco" name="preco" required min="0" />
      </label>

      <label>
        Descrição
        <input type="text" [(ngModel)]="descricao" name="descricao" required />
      </label>

      <button type="submit">Adicionar Produto</button>
    </form>
  </section>

  <section class="admin-list">
    <h2>Produtos cadastrados</h2>
    <ul *ngIf="produtos().length > 0; else listaVazia">
      <li *ngFor="let produto of produtos()">
        {{ produto.nome }} - R$ {{ produto.preco | number:'1.2-2' }}
        <button (click)="excluirProduto(produto.id)">Excluir</button>
      </li>
    </ul>
    <ng-template #listaVazia>
      <p>Nenhum produto cadastrado hoje.</p>
    </ng-template>
  </section>
</div>
