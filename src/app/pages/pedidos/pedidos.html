<div class="pedidos">
  <h1>Gestão de Pedidos 📦</h1>

  <form (ngSubmit)="salvar()">
    <input type="text" [(ngModel)]="novoPedido.cliente" name="cliente" placeholder="Cliente" required />
    <input type="number" [(ngModel)]="novoPedido.quantidade" name="quantidade" placeholder="Quantidade" required />
    <input type="text" [(ngModel)]="novoPedido.produto" name="produto" placeholder="Produto" required />

    <select [(ngModel)]="novoPedido.status" name="status">
      <option value="PENDENTE">Pendente</option>
      <option value="CONCLUÍDO">Concluído</option>
    </select>

    <button type="submit">Salvar</button>
  </form>

  <ul>
    <li *ngFor="let p of pedidos">
      <strong>{{ p.cliente }}</strong> pediu {{ p.quantidade }}x {{ p.produto }}
      <span> - Status: {{ p.status }}</span>
      <button (click)="excluir(p.id)">Excluir</button>
    </li>
  </ul>
</div>
